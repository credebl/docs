      required:
        - externalIp
        - inboundEndpoint
        - sgApiKey
        - emailFrom
        - apiEndPoint
        - enableEcosystem
        - multiEcosystemSupport
    CreateCredentialDefinitionDto:
      type: object
      properties:
        tag:
