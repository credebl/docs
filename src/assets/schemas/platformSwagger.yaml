              displayName: Name
              isRequired: true
          type: array
          items:
            $ref: '#/components/schemas/AttributeValue'
        orgDid:
          type: string
      required:
        - schemaVersion
        - schemaName
        - attributes
    W3CAttributeValue:
      type: object
      properties:
        attributeName:
          type: string
        displayName:
          type: string
        schemaDataType:
          type: string
          description: The type of the schema
          enum:
            - number
            - integer
            - string
            - datetime-local
          example: string
        isRequired:
          type: boolean
      required:
        - attributeName
        - displayName
        - schemaDataType
        - isRequired
    CreateW3CSchemaDto:
      type: object
      properties:
        attributes:
          example:
            - attributeName: name
              schemaDataType: string
              displayName: Name
              isRequired: true
          type: array
          items:
            $ref: '#/components/schemas/W3CAttributeValue'
        schemaName:
          type: string
        description:
          type: string
        schemaType:
          type: string
          description: The type of the schema
          enum:
            - polygon
            - no_ledger
          example: polygon
      required:
        - attributes
        - schemaName
        - description
        - schemaType
    GenericSchemaDTO:
      type: object
      properties:
        type:
          type: string
          description: The type of the schema
          enum:
            - json
            - indy
          example: indy
        schemaPayload:
          oneOf:
            - $ref: '#/components/schemas/CreateSchemaDto'
            - $ref: '#/components/schemas/CreateW3CSchemaDto'
      required:
        - type
        - schemaPayload
    ProofRequestAttribute:
      type: object
      properties:
        schemaId:
          type: string
        condition:
          type: string
        value:
          type: string
        credDefId:
          type: string
    ProofRequestAttributeDto:
      type: object
      properties:
        attributes:
          example:
            - attributeName: attributeName
              condition: '>='
              value: predicates
              credDefId: string
              schemaId: string
          type: array
          items:
            $ref: '#/components/schemas/ProofRequestAttribute'
      required:
        - attributes
    IndyDto:
      type: object
      properties:
        indy:
          example:
            attributes:
              - attributeName: attributeName
                condition: '>='
                value: predicates
                credDefId: string
                schemaId: string
          type: array
          items:
            $ref: '#/components/schemas/ProofRequestAttributeDto'
      required:
        - indy
    Schema:
      type: object
      properties:
        uri:
          type: string
      required:
        - uri
    Fields:
      type: object
      properties:
        path:
          type: array
          items:
            type: string
      required:
        - path
    Constraints:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Fields'
      required:
        - fields
    InputDescriptors:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        purpose:
          type: string
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Schema'
        constraints:
          $ref: '#/components/schemas/Constraints'
      required:
        - id
        - name
        - purpose
        - schema
        - constraints
    ProofRequestPresentationDefinition:
      type: object
      properties:
        input_descriptors:
          type: array
          items:
            $ref: '#/components/schemas/InputDescriptors'
      required:
        - input_descriptors
    RequestProofDto:
      type: object
      properties:
