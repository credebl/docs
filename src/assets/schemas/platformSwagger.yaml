          default: false
      required:
        - tag
        - schemaLedgerId
        - revocable
    AttributeValue:
      type: object
      properties:
        attributeName:
          type: string
        schemaDataType:
          type: string
        displayName:
          type: string
        isRequired:
          type: boolean
      required:
        - attributeName
        - schemaDataType
        - displayName
        - isRequired
