          type: string
        parentThreadId:
          type: string
        willConfirm:
          type: boolean
        protocolVersion:
          type: string
        connectionId:
          type: string
        proofFormats:
          example:
            indy:
              attributes:
                - attributeName: attributeName
                  condition: '>='
                  value: predicates
                  credDefId: string
                  schemaId: string
          type: array
          items:
            $ref: '#/components/schemas/IndyDto'
        presentationDefinition:
          example:
            id: 32f54163-7166-48f1-93d8-ff217bdb0653
            inputDescriptors:
              - id: healthcare_input_1
                name: Medical History
                schema:
                  - uri: https://health-schemas.org/1.0.1/medical_history.json
                constraints:
                  fields:
                    - path:
                        - $.PatientID
          type: array
          items:
            $ref: '#/components/schemas/ProofRequestPresentationDefinition'
        comment:
          type: string
        autoAcceptProof:
          type: object
      required:
        - connectionId
        - proofFormats
        - presentationDefinition
    SendProofRequestPayload:
      type: object
      properties:
        goalCode:
          type: string
        protocolVersion:
          type: string
        comment:
          type: string
        proofFormats:
          type: object
          example:
            indy:
              name: Verify national identity
              version: '1.0'
              requested_attributes:
                verifynameAddress:
                  names:
                    - name
                    - address
                  restrictions:
                    - schema_id: KU583UbI4yAKfaBTSz1rqG:2:National ID:1.0.0
                verifyBirthPlace:
                  name: Place
                  restrictions:
                    - schema_id: KU583UbI4yAKfaBTSz1rqG:2:Birth Certificate:1.0.0
              requested_predicates: {}
        presentationDefinition:
          example:
            id: 32f54163-7166-48f1-93d8-ff217bdb0653
            inputDescriptors:
              - id: banking_input_1
